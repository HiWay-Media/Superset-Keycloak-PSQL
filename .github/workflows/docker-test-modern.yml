name: Test Docker SuperSet Keycloak Modern

on:
  pull_request:
    branches:
      - master
      - main
    paths:
      - Dockerfile.modern
      - superset_config.py
      - keycloak_security_manager.py
      - .github/workflows/docker-test-modern.yml
  push:
    branches:
      - master
      - main
    paths:
      - Dockerfile.modern
      - superset_config.py
      - keycloak_security_manager.py
      - .github/workflows/docker-test-modern.yml
  workflow_dispatch:
    inputs:
      superset_tag:
        description: "Base apache/superset tag for Dockerfile.modern"
        required: false
        default: "6.1.0"
      keycloak_tag:
        description: "Keycloak image tag used in compose smoke test"
        required: false
        default: "26.1"

jobs:
  modern-compose-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare
        id: prep
        run: |
          BASE_TAG="${{ github.event.inputs.superset_tag }}"
          if [ -z "$BASE_TAG" ]; then
            BASE_TAG=6.1.0
          fi
          KEYCLOAK_TAG="${{ github.event.inputs.keycloak_tag }}"
          if [ -z "$KEYCLOAK_TAG" ]; then
            KEYCLOAK_TAG=26.1
          fi
          echo "base_tag=${BASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "keycloak_tag=${KEYCLOAK_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build modern image for tests
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.modern
          load: true
          tags: superset-keycloak-modern:test
          build-args: |
            SUPERSET_TAG=${{ steps.prep.outputs.base_tag }}

      - name: Create compose file
        run: |
          cat > docker-compose.modern-ci.yml <<'EOF'
          services:
            db:
              image: postgres:15-alpine
              environment:
                POSTGRES_DB: superset
                POSTGRES_USER: superset
                POSTGRES_PASSWORD: superset
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U superset -d superset"]
                interval: 5s
                timeout: 5s
                retries: 20

            keycloak:
              image: quay.io/keycloak/keycloak:${{ steps.prep.outputs.keycloak_tag }}
              command: ["start-dev", "--http-port=8080", "--hostname-strict=false"]
              ports:
                - "8080:8080"
              environment:
                KEYCLOAK_ADMIN: admin
                KEYCLOAK_ADMIN_PASSWORD: admin

            superset:
              image: superset-keycloak-modern:test
              depends_on:
                db:
                  condition: service_healthy
              ports:
                - "8088:8088"
              environment:
                DB_DIALECT: postgresql
                DB_USER: superset
                DB_PASSWORD: superset
                DB_HOST: db
                DB_PORT: "5432"
                DB_NAME: superset
                SECRET_KEY: ci-secret-key
                OIDC_ENABLE: "False"
                SMTP_ENABLE: "False"
              command: >
                /bin/sh -ec "
                superset db upgrade &&
                superset fab create-admin
                --username admin
                --firstname CI
                --lastname Admin
                --email ci@example.com
                --password admin &&
                superset init &&
                /usr/bin/run-server.sh"
          EOF

      - name: Start stack
        run: docker compose -f docker-compose.modern-ci.yml up -d

      - name: Wait for Keycloak readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8080/realms/master/.well-known/openid-configuration >/dev/null; then
              echo "Keycloak is ready"
              exit 0
            fi
            sleep 5
          done

          echo "Keycloak did not become ready in time"
          exit 1

      - name: Wait for Superset health endpoint
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8088/health | grep -qi 'ok'; then
              echo "Superset is healthy"
              exit 0
            fi
            sleep 5
          done

          echo "Superset did not become healthy in time"
          exit 1

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.modern-ci.yml logs --no-color

      - name: Stop stack
        if: always()
        run: docker compose -f docker-compose.modern-ci.yml down -v

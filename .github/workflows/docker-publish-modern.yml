name: Docker SuperSet Keycloak Modern

on:
  push:
    branches: 
      - master
      - main
    tags:
      - modern-v*
  workflow_dispatch:
    inputs:
      superset_tag:
        description: "Base apache/superset tag for Dockerfile.modern"
        required: false
        default: "6.1.0"

jobs:
  superset-docker-modern:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repo metadata
        id: repo
        uses: actions/github-script@v7
        with:
          script: |
            const repo = await github.rest.repos.get(context.repo)
            return repo.data

      - name: Prepare
        id: prep
        run: |
          REG=ghcr.io
          IMAGE=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          DOCKER_IMAGE=${REG}/${IMAGE}-modern
          VERSION=modern-manual

          if [[ $GITHUB_REF == refs/tags/modern-v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/modern-v}
          fi

          if [ -z "$VERSION" ]; then
            VERSION=manual
          fi

          TAGS="${DOCKER_IMAGE}:${VERSION},${DOCKER_IMAGE}:latest"

          BASE_TAG="${{ github.event.inputs.superset_tag }}"
          if [ -z "$BASE_TAG" ]; then
            BASE_TAG=6.1.0
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "base_tag=${BASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push modern
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.modern
          platforms: linux/amd64
          push: true
          build-args: |
            SUPERSET_TAG=${{ steps.prep.outputs.base_tag }}
          tags: ${{ steps.prep.outputs.tags }}
          labels: |
            org.opencontainers.image.title=${{ fromJson(steps.repo.outputs.result).name }}-modern
            org.opencontainers.image.description=${{ fromJson(steps.repo.outputs.result).description }} (modern)
            org.opencontainers.image.url=${{ fromJson(steps.repo.outputs.result).html_url }}
            org.opencontainers.image.source=${{ fromJson(steps.repo.outputs.result).html_url }}
            org.opencontainers.image.version=${{ steps.prep.outputs.version }}
            org.opencontainers.image.created=${{ steps.prep.outputs.created }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=${{ fromJson(steps.repo.outputs.result).license.spdx_id }}
